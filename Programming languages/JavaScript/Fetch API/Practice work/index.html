<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch API Sandbpx</title>
</head>
<body>
    <button id="getText">Get Text</button>
    <button id="getUsers">Get Users</button>
    <button id="getAPI">Get API</button>
    <hr>
    <br>
    <div id="output"></div>
    <br>
    <hr>
    <form id="addPost">
        <div>
            <input type="text" id="title" placeholder="Enter the title">
        </div>
        <br>
        <div>
            <textarea name="details" id="body" placeholder="Enter" cols="15" rows="5"></textarea>
        </div>
        <div class="submit">
            <input type="submit" value="Submit">
        </div>
    </form>
    <script>
        document.getElementById("getText").addEventListener('click', getText);
        document.getElementById("getUsers").addEventListener('click', getUsers);
        document.getElementById("getAPI").addEventListener('click', getAPI);
        document.getElementById("addPost").addEventListener('submit', addPost);

        function getText(){
            fetch('sample.txt')
            .then(function(res){return (res.text());})
            .then(function(data){
                console.log(data);
                document.getElementById('output').innerHTML = data;
            });
        }
        function getUsers(){
            fetch("users.json")
            .then((res)=> res.json())
            .then((jsonfile)=>{
                console.log(jsonfile);
                output = '<h2>USERS</h2>';
                jsonfile.forEach(element => {
                    output += `
                    <ul>
                        <li id="ID">ID: ${element.id}</li>    
                        <li id="name">Name: ${element.name}</li>    
                        <li id="email">Email: ${element.email}</li>    
                    </ul>
                    `;
                });
                document.getElementById('output').innerHTML = output;
            })
        }
        function getAPI(){
            fetch("https://jsonplaceholder.typicode.com/todos")
            .then((res)=> res.json())
            .then((jsonfile)=>{
                console.log(jsonfile);
                output = '<h2>Tasks and Status</h2>';
                jsonfile.forEach(element => {
                    output += `
                    <ul>
                        <li id="userID">User ID: ${element.userId}</li>
                        <li id="ID">ID: ${element.id}</li>    
                        <li id="title">Name: ${element.title}</li>    
                        <li id="isDone">Email: ${element.completed}</li>    
                    </ul>
                    `;
                });
                document.getElementById('output').innerHTML = output;
            })
        }/*We are just creating a new jason post, nothing will be added to the database itself*/
        function addPost(e){
            e.preventDefault();
            let title = document.getElementById('title').value;
            let body = document.getElementById('body').value;

            fetch('https://jsonplaceholder.typicode.com/posts',
            {
                method:'POST',
                headers:
                {
                    'Accept' : 'application/json, text/plain, */*',
                    'Content-type':'application/json'
                },
                body:JSON.stringify({title:title, body:body})
            })
            .then((res)=>res.json())
            .then((data)=>console.log(data));
        }
</script>
</body>
</html>
